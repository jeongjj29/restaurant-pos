repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        files: ^server/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^server/

  - repo: local
    hooks:
      - id: client-lint
        name: client-lint
        entry: bash -lc "cd client && npm run lint"
        language: system
        pass_filenames: false
      - id: client-typecheck
        name: client-typecheck
        entry: bash -lc "cd client && npm run typecheck"
        language: system
        pass_filenames: false
